services:
  - type: web
    name: otp-bot-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install -g pnpm@latest && pnpm install --frozen-lockfile
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: otp-bot-frontend
    runtime: static
    plan: free
    region: frankfurt
    branch: main
    buildCommand: echo static
    staticPublishPath: artifacts/otp-bot/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
